<!DOCTYPE html>
<html>
  <head>
    <title>粉絲應援術語大百科 - 7大天團真AR版</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    
    <style>
      body { margin: 0; overflow: hidden; font-family: 'PingFang TC', -apple-system, sans-serif; background-color: #000; }
      
      /* 2D UI 覆蓋層 */
      #ui-container {
        position: absolute; top: 0; left: 0; width: 100%; height: 100%;
        z-index: 10; pointer-events: none; display: flex; flex-direction: column;
        justify-content: space-between; box-sizing: border-box;
        padding: calc(20px + env(safe-area-inset-top)) 20px calc(20px + env(safe-area-inset-bottom)) 20px;
      }
      .interactive { pointer-events: auto; }
      .top-bar { display: flex; justify-content: space-between; align-items: center; width: 100%; }
      .btn-circle-top { width: 42px; height: 42px; background: rgba(255,255,255,0.12); border-radius: 50%; color: white; display: flex; align-items: center; justify-content: center; font-size: 18px; backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); cursor: pointer; border: 1px solid rgba(255,255,255,0.1); }
      .btn-circle-top.muted { background: rgba(239, 68, 68, 0.4); border-color: #ef4444; box-shadow: 0 0 10px rgba(239, 68, 68, 0.5); }
      
      .scan-reticle {
        position: absolute; top: 42%; left: 50%; transform: translate(-50%, -50%);
        width: 280px; height: 280px; border: 2px solid rgba(138, 92, 246, 0.25); border-radius: 28px; pointer-events: none;
      }
      .scan-reticle::before, .scan-reticle::after { content: ''; position: absolute; width: 35px; height: 35px; border-color: #c0aeff; border-style: solid; }
      .scan-reticle::before { top: -2px; left: -2px; border-width: 4px 0 0 4px; border-top-left-radius: 24px; }
      .scan-reticle::after { bottom: -2px; right: -2px; border-width: 0 4px 4px 0; border-bottom-right-radius: 24px; }

      .bottom-area { width: 100%; display: flex; flex-direction: column; align-items: center; gap: 15px; }
      .info-toast { text-align: center; color: white; width: 100%; padding: 0 10px; box-sizing: border-box; }
      .info-toast h3 { font-size: 18px; margin: 0 0 6px 0; color: #c0aeff; font-weight: 600; text-shadow: 0 2px 8px rgba(0,0,0,0.9); }
      .info-toast p { font-size: 13px; color: #e0e0e0; margin: 0; line-height: 1.4; text-shadow: 0 2px 6px rgba(0,0,0,0.9); }

      .bottom-panel {
        width: 100%; max-width: 360px; background: rgba(13, 13, 23, 0.88); border-radius: 28px; padding: 14px 10px;
        display: flex; justify-content: space-around; align-items: center;
        border: 1px solid rgba(138, 92, 246, 0.3); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5); box-sizing: border-box;
      }
      .nav-item { display: flex; flex-direction: column; align-items: center; gap: 6px; cursor: pointer; color: #7e7e8a; width: 22%; }
      .nav-icon { width: 48px; height: 48px; background: #141424; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; color: #b0b0cc; border: 1px solid rgba(255,255,255,0.03); }
      .nav-item span { font-size: 11px; font-weight: 500; }
      .nav-item.active { color: #c0aeff; }
      .nav-item.active .nav-icon { background: #8a5cf6; color: white; box-shadow: 0 0 16px rgba(138, 92, 246, 0.6); border-color: #a78bfa; }

      #music-menu {
        display: none; position: absolute; bottom: 110px; left: 50%; transform: translateX(-50%);
        background: rgba(20, 20, 35, 0.96); border: 1px solid #8a5cf6; border-radius: 18px;
        padding: 10px; width: 260px; box-shadow: 0 8px 32px rgba(0,0,0,0.6); z-index: 20;
        max-height: 220px; overflow-y: auto; backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
      }
      .song-item { color: white; padding: 12px; border-bottom: 1px solid #2d2d44; cursor: pointer; font-size: 14px; border-radius: 8px; text-align: left; }
      .song-item:hover { background: rgba(138, 92, 246, 0.3); color: #c0aeff; }
    </style>
  </head>

  <body>

    <div id="ui-container">
      <div class="top-bar interactive">
        <div class="btn-circle-top">✕</div>
        <div class="btn-circle-top" id="btn-mute">🔊</div>
      </div>

      <div class="scan-reticle"></div>

      <div class="bottom-area">
        <div class="info-toast">
          <h3 id="display-title">請對準團體特徵照片</h3>
          <p id="display-subtitle">AR 相機正在尋找追蹤目標...</p>
        </div>
        
        <div id="music-menu" class="interactive"></div>
        
        <div class="bottom-panel interactive">
          <div class="nav-item active" id="nav-scan">
            <div class="nav-icon">📷</div><span>掃描</span>
          </div>
          <div class="nav-item" id="nav-music">
            <div class="nav-icon">🎵</div><span>音樂選歌</span>
          </div>
          <div class="nav-item" id="nav-info">
            <div class="nav-icon">👤</div><span>介紹</span>
          </div>
          <div class="nav-item" id="nav-chant">
            <div class="nav-icon">🎤</div><span>應援詞</span>
          </div>
        </div>
      </div>
    </div>
<a-assets>
        <audio id="audio-player" preload="auto" loop></audio>
        
        <img id="img-svt" src="0.png">
        <img id="img-bts" src="1.jpg">
        <img id="img-twice" src="2.jpg">
        <img id="img-sj" src="3.jpg">
        <img id="img-ateez" src="4.jpg">
        <img id="img-riize" src="5.jpg">
        <img id="img-plave" src="6.png">
      </a-assets>

    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;" vr-mode-ui="enabled: false">
      <audio id="audio-player" preload="auto" loop></audio>

      <a-marker type="pattern" url="./0.patt" class="ar-marker" data-idx="0">
        <a-entity scale="0.5 0.5 0.5" position="0 0 0">
          <a-box src="#img-svt" width="1" height="1" depth="0.1" animation="property: rotation; to: 0 360 0; loop: true; dur: 8000; easing: linear"></a-box>
          <a-ring color="#c0aeff" radius-inner="0.8" radius-outer="0.85" rotation="75 0 0" position="0 -0.2 0"></a-ring>
        </a-entity>
      </a-marker>

      <a-marker type="pattern" url="./1.patt" class="ar-marker" data-idx="1">
        <a-entity scale="0.5 0.5 0.5"><a-box src="#img-bts" width="1" height="1" depth="0.1" animation="property: rotation; to: 0 360 0; loop: true; dur: 8000; easing: linear"></a-box></a-entity>
      </a-marker>

      <a-marker type="pattern" url="./2.patt" class="ar-marker" data-idx="2">
        <a-entity scale="0.5 0.5 0.5"><a-box src="#img-twice" width="1" height="1" depth="0.1" animation="property: rotation; to: 0 360 0; loop: true; dur: 8000; easing: linear"></a-box></a-entity>
      </a-marker>

      <a-marker type="pattern" url="./3.patt" class="ar-marker" data-idx="3">
        <a-entity scale="0.5 0.5 0.5"><a-box src="#img-sj" width="1" height="1" depth="0.1" animation="property: rotation; to: 0 360 0; loop: true; dur: 8000; easing: linear"></a-box></a-entity>
      </a-marker>

      <a-marker type="pattern" url="./4.patt" class="ar-marker" data-idx="4">
        <a-entity scale="0.5 0.5 0.5"><a-box src="#img-ateez" width="1" height="1" depth="0.1" animation="property: rotation; to: 0 360 0; loop: true; dur: 8000; easing: linear"></a-box></a-entity>
      </a-marker>

      <a-marker type="pattern" url="./5.patt" class="ar-marker" data-idx="5">
        <a-entity scale="0.5 0.5 0.5"><a-box src="#img-riize" width="1" height="1" depth="0.1" animation="property: rotation; to: 0 360 0; loop: true; dur: 8000; easing: linear"></a-box></a-entity>
      </a-marker>

      <a-marker type="pattern" url="./6.patt" class="ar-marker" data-idx="6">
        <a-entity scale="0.5 0.5 0.5"><a-box src="#img-plave" width="1" height="1" depth="0.1" animation="property: rotation; to: 0 360 0; loop: true; dur: 8000; easing: linear"></a-box></a-entity>
      </a-marker>
      <a-entity camera></a-entity>
    </a-scene>

    <script>
      // ==========================================
      // ✏️ 【應援詞已抽離放大格！在這邊修改內容】
      // ==========================================
      const allGroups = [
        {
          name: "SEVENTEEN (SVT)", 
          fans: "CARAT", 
          intro: "13人自作偶像，分嘻哈、表演、主唱三隊。",
          chant: "SVT 核心應援：勝哲、淨漢、知秀、俊輝、順榮、圓佑、知勳、明浩、珉奎、碩珉、勝寛、韓率、燦！SAY THE NAME!", // <-- 獨立大格的應援詞
          songs: [
            { title: "Super (孫悟空)", url: "./music/svt_super.mp3" },
            { title: "Don't Wanna Cry", url: "./music/svt_cry.mp3" }
          ]
        },
        {
          name: "BTS (防彈少年團)", 
          fans: "ARMY", 
          intro: "引領全球熱潮的世界級男團，世界觀結構宏大。",
          chant: "BTS 核心應援：金南俊、金碩珍、閔玧其、鄭號錫、朴智旻、金泰亨、田柾國、BTS！", // <-- 獨立大格的應援詞
          songs: [
            { title: "Dynamite", url: "./music/bts_dynamite.mp3" },
            { title: "Butter", url: "./music/bts_butter.mp3" }
          ]
        },
        {
          name: "TWICE", fans: "ONCE", intro: "JYP旗下代表性國民女團，熱門曲目傳唱度極高。",
          chant: "TWICE 核心應援：林娜璉、俞定延、平井桃、湊崎紗夏、朴志效、名井南、金多賢、孫彩瑛、周子瑜、TWICE！",
          songs: [{ title: "TT", url: "./music/twice_tt.mp3" }]
        },
        {
          name: "SUPER JUNIOR", fans: "E.L.F.", intro: "韓流帝王，開啟多人組合時代的傳奇長壽男團。",
          chant: "SJ 核心應援：利特、希澈、藝聲、神童、銀赫、東海、始源、厲旭、圭賢、SUPER JUNIOR！",
          songs: [{ title: "Sorry, Sorry", url: "./music/sj_sorry.mp3" }]
        },
        {
          name: "ATEEZ", fans: "ATINY", intro: "以強烈舞台表現力與獨特海盜世界觀著稱的表演強者。",
          chant: "ATEEZ 核心應援：弘中、星化、潤浩、呂尚、傘、旼琦、友榮、鍾浩、ATEEZ!",
          songs: [{ title: "BOUNCY", url: "./music/ateez_bouncy.mp3" }]
        },
        {
          name: "RIIZE", fans: "BRIIZ", intro: "SM旗下崛起新男團，主打情緒化流行樂風格。",
          chant: "RIIZE 核心應援：將太郎、恩奭、成燦、元彬、昭熙、 Anton、RIIZE！",
          songs: [{ title: "Get A Guitar", url: "./music/riize_guitar.mp3" }]
        },
        {
          name: "PLAVE", fans: "PLLI (噗莉)", intro: "將虛擬技術與卓越詞曲創作力融合的超人氣虛擬男團。",
          chant: "PLAVE 核心應援：藝俊、諾亞、斑比、銀虎、河民、PLAVE！",
          songs: [{ title: "WAY 4 LUV", url: "./music/plave_way.mp3" }]
        }
      ];

      let currentGroupIndex = 0; 
      let currentSongIndex = 0;   
      let isMuted = false; 

      const markers = document.querySelectorAll('.ar-marker');
      const audioPlayer = document.querySelector('#audio-player');
      const displayTitle = document.querySelector('#display-title');
      const displaySubtitle = document.querySelector('#display-subtitle');
      const musicMenu = document.querySelector('#music-menu');
      const muteBtn = document.querySelector('#btn-mute');

      markers.forEach((marker) => {
        marker.addEventListener("markerFound", () => {
          const idx = parseInt(marker.getAttribute('data-idx'));
          currentGroupIndex = idx; 
          currentSongIndex = 0; 
          
          playMusic();
          updateUI(allGroups[currentGroupIndex].name, `已辨識！目前播放：${allGroups[currentGroupIndex].songs[currentSongIndex].title}`);
          buildMusicMenu(); 
          setActiveNav(document.querySelector('#nav-scan'));
        });
      });

      function playMusic() {
        if (allGroups[currentGroupIndex].songs.length > 0) {
          const songUrl = allGroups[currentGroupIndex].songs[currentSongIndex].url;
          audioPlayer.src = songUrl;
          audioPlayer.muted = isMuted;
          
          var playPromise = audioPlayer.play();
          if (playPromise !== undefined) {
            playPromise.catch(error => { console.log("等待使用者互動以播放音樂"); });
          }
        }
      }

      muteBtn.addEventListener('click', () => {
        isMuted = !isMuted;
        audioPlayer.muted = isMuted;
        if(isMuted) {
          muteBtn.innerText = "🔇";
          muteBtn.classList.add('muted');
        } else {
          muteBtn.innerText = "🔊";
          muteBtn.classList.remove('muted');
        }
      });

      function updateUI(title, subtitle) {
        displayTitle.innerText = title;
        displaySubtitle.innerText = subtitle;
      }

      function buildMusicMenu() {
        musicMenu.innerHTML = '';
        const currentGroup = allGroups[currentGroupIndex];
        currentGroup.songs.forEach((song, i) => {
          const div = document.createElement('div');
          div.className = 'song-item';
          div.innerText = `${i+1}. ${song.title}`;
          div.onclick = () => {
            currentSongIndex = i;
            playMusic();
            updateUI(`已切換歌曲：${song.title}`, "音樂播放中...");
            musicMenu.style.display = 'none';
            setActiveNav(document.querySelector('#nav-scan'));
          };
          musicMenu.appendChild(div);
        });
      }

      document.querySelector('#nav-music').addEventListener('click', () => {
        setActiveNav(document.querySelector('#nav-music'));
        buildMusicMenu(); 
        musicMenu.style.display = musicMenu.style.display === 'block' ? 'none' : 'block';
        if(musicMenu.style.display === 'block') updateUI("手動挑選主打歌", "請點選上方歌單進行切換");
      });

      document.querySelector('#nav-info').addEventListener('click', () => {
        setActiveNav(document.querySelector('#nav-info'));
        musicMenu.style.display = 'none';
        const group = allGroups[currentGroupIndex];
        updateUI(`${group.name} | 粉絲名：${group.fans}`, group.intro);
      });

      // 🎤 修正後的【應援詞按鈕】：獨立讀取該團體的專屬核心應援，不再與當前歌曲掛鉤
      document.querySelector('#nav-chant').addEventListener('click', () => {
        setActiveNav(document.querySelector('#nav-chant'));
        musicMenu.style.display = 'none';
        const group = allGroups[currentGroupIndex];
        updateUI(`${group.name} 官方應援`, group.chant);
      });

      function setActiveNav(activeBtn) {
        document.querySelectorAll('.nav-item').forEach(btn => btn.classList.remove('active'));
        activeBtn.classList.add('active');
      }
    </script>
  </body>
</html>
