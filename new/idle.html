<!DOCTYPE html>
<html>
  <head>
    <title>粉絲應援術語大百科 - 7大天團真AR版</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.1.5/dist/mindar-image-aframe.prod.js"></script>
    
    <style>
      body { margin: 0; overflow: hidden; font-family: 'PingFang TC', sans-serif; }
      #ui-container {
        position: absolute; top: 0; left: 0; width: 100%; height: 100%;
        z-index: 10; pointer-events: none; display: flex; flex-direction: column;
        justify-content: space-between; box-sizing: border-box; padding: 40px 20px;
      }
      .interactive { pointer-events: auto; }
      .top-bar { display: flex; justify-content: space-between; align-items: center; }
      .btn-circle-top { width: 40px; height: 40px; background: rgba(255,255,255,0.15); border-radius: 50%; color: white; display: flex; align-items: center; justify-content: center; font-size: 20px; cursor: pointer; backdrop-filter: blur(5px); }
      
      .scan-reticle {
        position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%);
        width: 260px; height: 260px; border: 2px solid rgba(138, 92, 246, 0.3); border-radius: 24px; pointer-events: none;
      }
      .scan-reticle::before, .scan-reticle::after { content: ''; position: absolute; width: 30px; height: 30px; border-color: #a78bfa; border-style: solid; }
      .scan-reticle::before { top: -2px; left: -2px; border-width: 4px 0 0 4px; border-top-left-radius: 20px; }
      .scan-reticle::after { bottom: -2px; right: -2px; border-width: 0 4px 4px 0; border-bottom-right-radius: 20px; }

      .info-toast { text-align: center; color: white; margin-bottom: 15px; }
      .info-toast h3 { font-size: 18px; margin: 0 0 6px 0; color: #c0aeff; text-shadow: 0 2px 4px rgba(0,0,0,0.8); }
      .info-toast p { font-size: 13px; color: #e0e0e0; margin: 0; text-shadow: 0 1px 3px rgba(0,0,0,0.8); }

      .bottom-panel {
        background: rgba(13, 13, 23, 0.9); border-radius: 30px; padding: 20px;
        display: flex; justify-content: space-around; align-items: center;
        border: 1px solid rgba(138, 92, 246, 0.3); backdrop-filter: blur(10px);
      }
      .nav-item { display: flex; flex-direction: column; align-items: center; gap: 8px; cursor: pointer; color: #7e7e8a; }
      .nav-icon { width: 50px; height: 50px; background: #1a1a2e; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; color: #b0b0cc; }
      .nav-item span { font-size: 12px; }
      .nav-item.active { color: #c0aeff; }
      .nav-item.active .nav-icon { background: #8a5cf6; color: white; box-shadow: 0 0 15px #8a5cf6; }

      /* 動態生成歌曲的選單 */
      #music-menu {
        display: none; position: absolute; bottom: 150px; left: 50%; transform: translateX(-50%);
        background: rgba(20, 20, 35, 0.95); border: 1px solid #8a5cf6; border-radius: 15px;
        padding: 15px; width: 250px; box-shadow: 0 4px 20px rgba(0,0,0,0.5); z-index: 20;
        max-height: 200px; overflow-y: auto;
      }
      .song-item { color: white; padding: 10px; border-bottom: 1px solid #2d2d44; cursor: pointer; font-size: 14px; }
      .song-item:hover { background: #8a5cf6; }
    </style>
  </head>

  <body>

    <div id="ui-container">
      <div class="top-bar interactive">
        <div class="btn-circle-top">✕</div>
        <div class="btn-circle-top">?</div>
      </div>

      <div class="scan-reticle"></div>

      <div class="bottom-area">
        <div class="info-toast">
          <h3 id="display-title">請對準團體海報或專輯</h3>
          <p id="display-subtitle">已支援 7 大 K-pop 團體辨識</p>
        </div>
        
        <div id="music-menu" class="interactive"></div>
        
        <div class="bottom-panel interactive">
          <div class="nav-item active" id="nav-scan">
            <div class="nav-icon">📷</div><span>掃描</span>
          </div>
          <div class="nav-item" id="nav-music">
            <div class="nav-icon">🎵</div><span>音樂選歌</span>
          </div>
          <div class="nav-item" id="nav-info">
            <div class="nav-icon">👤</div><span>介紹</span>
          </div>
          <div class="nav-item" id="nav-chant">
            <div class="nav-icon">🎤</div><span>應援詞</span>
          </div>
        </div>
      </div>
    </div>

    <a-scene mindar-image="imageTargetSrc: ./targets.mind; autoStart: true; uiScanning: no;" embedded color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" vr-mode-ui="enabled: false">
      <a-assets>
        <audio id="audio-player" src="https://actions.google.com/sounds/v1/ambiences/morning_birds.ogg" preload="auto"></audio>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity class="ar-marker" mindar-image-target="targetIndex: 0">
        <a-entity position="0 0 0" scale="0.5 0.5 0.5">
          <a-box color="#8a5cf6" width="1" height="1.2" depth="0.1" animation="property: rotation; to: 0 360 0; loop: true; dur: 8000; easing: linear"></a-box>
          <a-ring color="#c0aeff" radius-inner="0.8" radius-outer="0.85" rotation="75 0 0" position="0 -0.2 0"></a-ring>
        </a-entity>
      </a-entity>

      <a-entity class="ar-marker" mindar-image-target="targetIndex: 1">
        <a-entity position="0 0 0" scale="0.5 0.5 0.5">
          <a-box color="#3b82f6" width="1" height="1.2" depth="0.1" animation="property: rotation; to: 0 360 0; loop: true; dur: 8000; easing: linear"></a-box>
        </a-entity>
      </a-entity>

      <a-entity class="ar-marker" mindar-image-target="targetIndex: 2">
        <a-entity position="0 0 0" scale="0.5 0.5 0.5">
          <a-box color="#ec4899" width="1" height="1.2" depth="0.1" animation="property: rotation; to: 0 360 0; loop: true; dur: 8000; easing: linear"></a-box>
        </a-entity>
      </a-entity>

      <a-entity class="ar-marker" mindar-image-target="targetIndex: 3">
        <a-entity position="0 0 0" scale="0.5 0.5 0.5">
          <a-box color="#1e3a8a" width="1" height="1.2" depth="0.1" animation="property: rotation; to: 0 360 0; loop: true; dur: 8000; easing: linear"></a-box>
        </a-entity>
      </a-entity>

      <a-entity class="ar-marker" mindar-image-target="targetIndex: 4">
        <a-entity position="0 0 0" scale="0.5 0.5 0.5">
          <a-box color="#f59e0b" width="1" height="1.2" depth="0.1" animation="property: rotation; to: 0 360 0; loop: true; dur: 8000; easing: linear"></a-box>
        </a-entity>
      </a-entity>

      <a-entity class="ar-marker" mindar-image-target="targetIndex: 5">
        <a-entity position="0 0 0" scale="0.5 0.5 0.5">
          <a-box color="#10b981" width="1" height="1.2" depth="0.1" animation="property: rotation; to: 0 360 0; loop: true; dur: 8000; easing: linear"></a-box>
        </a-entity>
      </a-entity>

      <a-entity class="ar-marker" mindar-image-target="targetIndex: 6">
        <a-entity position="0 0 0" scale="0.5 0.5 0.5">
          <a-box color="#6366f1" width="1" height="1.2" depth="0.1" animation="property: rotation; to: 0 360 0; loop: true; dur: 8000; easing: linear"></a-box>
        </a-entity>
      </a-entity>

    </a-scene>

    <script>
      // 7大天團完整資料庫
      const allGroups = [
        {
          name: "SEVENTEEN (SVT)", fans: "CARAT", intro: "13人自作偶像，分嘻哈、表演、主唱三隊。",
          songs: [
            { title: "Super (孫悟空)", chant: "DARUMDARIMDA! 咚隆咚隆噠！" },
            { title: "Don't Wanna Cry", chant: "不想哭泣！울고 싶지 않아！" },
            { title: "Very Nice", chant: "아주 NICE！非常完美！" },
            { title: "Left & Right", chant: "Left and Right! Rip it!" },
            { title: "Rock with you", chant: "No words needed! Rock with you!" }
          ]
        },
        {
          name: "BTS (防彈少年團)", fans: "ARMY", intro: "引領全球熱潮的世界級男團，世界觀結構宏大。",
          songs: [
            { title: "Dynamite", chant: "Light it up like dynamite!" },
            { title: "Butter", chant: "Smooth like butter~" },
            { title: "Boy With Luv", chant: "Oh my my my!" },
            { title: "DNA", chant: "一望便知因緣鎖定！" },
            { title: "Spring Day", chant: "想念你，這樣說出口更想念了。" }
          ]
        },
        {
          name: "TWICE", fans: "ONCE", intro: "JYP旗下代表性國民女團，熱門曲目傳唱度極高。",
          songs: [
            { title: "TT", chant: "I'm like TT, Just like TT!" },
            { title: "Cheer Up", chant: "Shy Shy Shy!" },
            { title: "What is Love?", chant: "I wanna know 什麼是愛？" },
            { title: "Fancy", chant: "FANCY YOU!" },
            { title: "Feel Special", chant: "You make me feel special~" }
          ]
        },
        {
          name: "SUPER JUNIOR", fans: "E.L.F.", intro: "韓流帝王，開啟多人組合時代的傳奇長壽男團。",
          songs: [
            { title: "Sorry, Sorry", chant: "Sorry Sorry Sorry Sorry~" },
            { title: "Mr. Simple", chant: "Blow Your Mind!" },
            { title: "Bonamana", chant: "Bounce to you, Bounce to you!" },
            { title: "MAMACITA", chant: "Hey! MAMACITA~" },
            { title: "Black Suit", chant: "穿上黑西裝！" }
          ]
        },
        {
          name: "ATEEZ", fans: "ATINY", intro: "以強烈舞台表現力與獨特海盜世界觀著稱的表演強者。",
          songs: [
            { title: "BOUNCY", chant: "Make it BOUNCY! 辣椒味！" },
            { title: "Guerrilla", chant: "Break the wall! 吶喊吧！" },
            { title: "Hala Hala", chant: "Hearts awakened!" },
            { title: "Answer", chant: "乾杯吧！像乾盡這火山一樣！" },
            { title: "Crazy Form", chant: "我們特有的 Crazy Form！" }
          ]
        },
        {
          name: "RIIZE", fans: "BRIIZ", intro: "SM旗下崛起新男團，主打「情緒化流行樂 (Emotional Pop)」風格。",
          songs: [
            { title: "Get A Guitar", chant: "Get A Guitar! 彈吉他！" },
            { title: "Talk Saxy", chant: "Talk Saxy to me!" },
            { title: "Love 119", chant: "急救 119！" },
            { title: "Siren", chant: "嗶啵嗶啵！Siren 警報！" },
            { title: "Impossible", chant: "Nothing is impossible!" }
          ]
        },
        {
          name: "PLAVE", fans: "PLLI (噗莉)", intro: "將虛擬技術與卓越詞曲創作力融合的超人氣虛擬男團。",
          songs: [
            { title: "WAY 4 LUV", chant: "尋找走向你的 WAY 4 LUV！" },
            { title: "Pixel World", chant: "歡迎來到像素世界！" },
            { title: "The 6th Summer", chant: "第六個夏天，與你相遇。" },
            { title: "Wait For You", chant: "請等待我，在那星宿盡頭。" },
            { title: "Pump Up The Volume", chant: "提高音量！" }
          ]
        }
      ];

      let currentGroupIndex = 0; // 當前鏡頭辨識到的團體
      let currentSongIndex = 0;   // 當前播放的歌曲
      
      const markers = document.querySelectorAll('.ar-marker');
      const audioPlayer = document.querySelector('#audio-player');
      const displayTitle = document.querySelector('#display-title');
      const displaySubtitle = document.querySelector('#display-subtitle');
      const musicMenu = document.querySelector('#music-menu');

      // 監聽 7 個標籤的辨識事件
      markers.forEach((marker, idx) => {
        marker.addEventListener("targetFound", () => {
          currentGroupIndex = idx; // 自動判定玩家照到哪個團
          currentSongIndex = Math.floor(Math.random() * allGroups[currentGroupIndex].songs.length); // 隨機一首
          
          playMusic();
          updateUI(allGroups[currentGroupIndex].name, `隨機播放主打：${allGroups[currentGroupIndex].songs[currentSongIndex].title}`);
          buildMusicMenu(); // 重新動態產生該團體的選歌單
          setActiveNav(document.querySelector('#nav-scan'));
        });
      });

      function playMusic() {
        audioPlayer.components.sound.stopSound();
        audioPlayer.components.sound.playSound();
      }

      function updateUI(title, subtitle) {
        displayTitle.innerText = title;
        displaySubtitle.innerText = subtitle;
      }

      // 動態渲染選歌清單
      function buildMusicMenu() {
        musicMenu.innerHTML = '';
        const currentGroup = allGroups[currentGroupIndex];
        currentGroup.songs.forEach((song, i) => {
          const div = document.createElement('div');
          div.className = 'song-item';
          div.innerText = `${i+1}. ${song.title}`;
          div.onclick = () => {
            currentSongIndex = i;
            playMusic();
            updateUI(`已切換歌曲：${song.title}`, "音樂播放中...");
            musicMenu.style.display = 'none';
          };
          musicMenu.appendChild(div);
        });
      }

      // 按鈕事件繫結
      document.querySelector('#nav-music').addEventListener('click', () => {
        setActiveNav(document.querySelector('#nav-music'));
        musicMenu.style.display = musicMenu.style.display === 'block' ? 'none' : 'block';
        if(musicMenu.style.display === 'block') updateUI("手動挑選主打歌", "請點選上方歌單進行切換");
      });

      document.querySelector('#nav-info').addEventListener('click', () => {
        setActiveNav(document.querySelector('#nav-info'));
        musicMenu.style.display = 'none';
        const group = allGroups[currentGroupIndex];
        updateUI(`${group.name} | 粉絲名：${group.fans}`, group.intro);
      });

      document.querySelector('#nav-chant').addEventListener('click', () => {
        setActiveNav(document.querySelector('#nav-chant'));
        musicMenu.style.display = 'none';
        const song = allGroups[currentGroupIndex].songs[currentSongIndex];
        updateUI(`歌曲：${song.title}`, `應援口號：${song.chant}`);
      });

      function setActiveNav(activeBtn) {
        document.querySelectorAll('.nav-item').forEach(btn => btn.classList.remove('active'));
        activeBtn.classList.add('active');
      }
    </script>
  </body>
</html>
